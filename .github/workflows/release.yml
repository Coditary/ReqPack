name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build-test-package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
      SOL2_VERSION: v3.3.0
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache/${{ matrix.target }}
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 300M
      HOMEBREW_NO_AUTO_UPDATE: '1'
      HOMEBREW_NO_INSTALL_CLEANUP: '1'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-latest
            family: linux
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
            family: linux
          - target: aarch64-darwin
            runner: macos-14
            family: macos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute cache scope
        id: cache-scope
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-v1-${{ matrix.target }}-${{ steps.cache-scope.outputs.week }}
          restore-keys: |
            ccache-v1-${{ matrix.target }}-

      - name: Install Linux dependencies
        if: matrix.family == 'linux'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential ca-certificates ccache cmake curl git pkg-config \
            libboost-dev libcli11-dev libcurl4-openssl-dev libfmt-dev \
            liblua5.4-dev libspdlog-dev libssl-dev libzstd-dev

      - name: Install macOS dependencies
        if: matrix.family == 'macos'
        run: |
          brew install ccache cli11 fmt spdlog boost zstd openssl@3 lua@5.4
          {
            echo "BREW_PREFIX=$(brew --prefix)"
            echo "OPENSSL_PREFIX=$(brew --prefix openssl@3)"
            echo "LUA_PREFIX=$(brew --prefix lua@5.4)"
            echo "ZSTD_PREFIX=$(brew --prefix zstd)"
          } >> "$GITHUB_ENV"

      - name: Install sol2 headers
        run: |
          git clone --depth 1 -b ${{ env.SOL2_VERSION }} https://github.com/ThePhD/sol2.git
          echo "SOL2_INCLUDE_DIR=${{ github.workspace }}/sol2/include" >> "$GITHUB_ENV"

      - name: Fix C++ optional ambiguity in tests
        run: |
          find tests -type f -name "*.cpp" -print0 | xargs -0 perl -pi -e 's/value_or\(\{\}\)/value_or("")/g'

      - name: Prepare compiler cache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --zero-stats

      - name: Build and test Linux targets
        if: matrix.family == 'linux'
        run: |
          rm -rf build
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSOL2_INCLUDE_DIR="${{ env.SOL2_INCLUDE_DIR }}"
          make -j$(nproc)
          ctest --output-on-failure

      - name: Build and test macOS targets
        if: matrix.family == 'macos'
        run: |
          export PKG_CONFIG_PATH="${OPENSSL_PREFIX}/lib/pkgconfig:${LUA_PREFIX}/lib/pkgconfig:${ZSTD_PREFIX}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
          rm -rf build
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="${BREW_PREFIX};${OPENSSL_PREFIX};${LUA_PREFIX};${ZSTD_PREFIX}" \
            -DOPENSSL_ROOT_DIR="${OPENSSL_PREFIX}" \
            -DREQPACK_ZSTD_LIBRARY="${ZSTD_PREFIX}/lib/libzstd.dylib" \
            -DSOL2_INCLUDE_DIR="${{ env.SOL2_INCLUDE_DIR }}" \
            -DLUA_INCLUDE_DIR="${LUA_PREFIX}/include/lua" \
            -DLUA_LIBRARIES="${LUA_PREFIX}/lib/liblua.5.4.dylib"
          make -j$(sysctl -n hw.ncpu)
          ctest --output-on-failure

      - name: Package release
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/rqp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C build rqp

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ matrix.target }}
          path: release-artifacts/rqp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build-test-package
    permissions:
      contents: write
    steps:
      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-bundle-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum rqp-*.tar.gz > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" release-artifacts/rqp-*.tar.gz release-artifacts/SHA256SUMS \
            --title "$tag" \
            --notes "Multi-target binaries for $tag. Verified by CI."
