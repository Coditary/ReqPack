name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

defaults:
  run:
    shell: bash

env:
  RELEASE_ID: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}

jobs:
  build-artifacts:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
      SOL2_VERSION: v3.3.0
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache/${{ matrix.target }}
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_MAXSIZE: 300M
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-24.04
            family: linux
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
            family: linux
          - target: aarch64-darwin
            runner: macos-14
            family: macos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute cache scope
        id: cache-scope
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-v1-${{ matrix.target }}-${{ steps.cache-scope.outputs.week }}
          restore-keys: |
            ccache-v1-${{ matrix.target }}-

      - name: Install Linux dependencies
        if: matrix.family == 'linux'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential ca-certificates ccache cmake curl git pkg-config \
            libboost-all-dev libcli11-dev libcurl4-openssl-dev libfmt-dev \
            liblua5.4-dev libspdlog-dev libssl-dev libzstd-dev

      - name: Install macOS dependencies
        if: matrix.family == 'macos'
        run: |
          brew install ccache cmake cli11 fmt spdlog boost zstd openssl@3 lua@5.4
          {
            echo "BREW_PREFIX=$(brew --prefix)"
            echo "OPENSSL_PREFIX=$(brew --prefix openssl@3)"
            echo "LUA_PREFIX=$(brew --prefix lua@5.4)"
            echo "ZSTD_PREFIX=$(brew --prefix zstd)"
          } >> "$GITHUB_ENV"

      - name: Install sol2 headers
        run: |
          mkdir -p "${{ github.workspace }}/third_party"
          bash .github/scripts/setup-sol2.sh "${{ github.workspace }}/third_party/include"
          echo "SOL2_INCLUDE_DIR=${{ github.workspace }}/third_party/include" >> "$GITHUB_ENV"

      - name: Prepare compiler cache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --zero-stats

      - name: Build Linux targets
        if: matrix.family == 'linux'
        run: |
          rm -rf build release-artifacts build-artifacts
          bash .github/scripts/configure-build.sh build linux \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSOL2_INCLUDE_DIR="${{ env.SOL2_INCLUDE_DIR }}"
          mkdir -p release-artifacts build-artifacts
          bash scripts/package_release_bundle.sh build/rqp "release-artifacts/rqp-${RELEASE_ID}-${{ matrix.target }}.tar.gz" linux
          bash .github/scripts/archive-build-tree.sh build "build-artifacts/build-tree-${{ matrix.target }}.tar.gz"

      - name: Build macOS targets
        if: matrix.family == 'macos'
        run: |
          export PKG_CONFIG_PATH="${OPENSSL_PREFIX}/lib/pkgconfig:${LUA_PREFIX}/lib/pkgconfig:${ZSTD_PREFIX}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
          rm -rf build release-artifacts build-artifacts
          bash .github/scripts/configure-build.sh build macos \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="${BREW_PREFIX};${OPENSSL_PREFIX};${LUA_PREFIX};${ZSTD_PREFIX}" \
            -DOPENSSL_ROOT_DIR="${OPENSSL_PREFIX}" \
            -DREQPACK_ZSTD_LIBRARY="${ZSTD_PREFIX}/lib/libzstd.a" \
            -DSOL2_INCLUDE_DIR="${{ env.SOL2_INCLUDE_DIR }}" \
            -DLUA_INCLUDE_DIR="${LUA_PREFIX}/include/lua" \
            -DLUA_LIBRARIES="${LUA_PREFIX}/lib/liblua.a"
          mkdir -p release-artifacts build-artifacts
          bash scripts/package_release_bundle.sh build/rqp "release-artifacts/rqp-${RELEASE_ID}-${{ matrix.target }}.tar.gz" macos
          bash .github/scripts/archive-build-tree.sh build "build-artifacts/build-tree-${{ matrix.target }}.tar.gz"

      - name: Upload build tree
        uses: actions/upload-artifact@v4
        with:
          name: build-tree-${{ matrix.target }}
          path: build-artifacts/build-tree-${{ matrix.target }}.tar.gz

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ matrix.target }}
          path: release-artifacts/rqp-${{ env.RELEASE_ID }}-${{ matrix.target }}.tar.gz

  unit-integration-tests:
    name: ctest-${{ matrix.target }}
    needs: build-artifacts
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-24.04
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
          - target: aarch64-darwin
            runner: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux runtime dependencies
        if: matrix.target != 'aarch64-darwin'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            cmake \
            libboost-all-dev libcli11-dev libcurl4-openssl-dev libfmt-dev \
            liblua5.4-dev libspdlog-dev libssl-dev libzstd-dev

      - name: Install macOS runtime dependencies
        if: matrix.target == 'aarch64-darwin'
        run: |
          brew install cmake cli11 fmt spdlog boost zstd openssl@3 lua@5.4

      - name: Download build tree artifact
        uses: actions/download-artifact@v4
        with:
          name: build-tree-${{ matrix.target }}
          path: build-artifacts

      - name: Restore build tree
        run: |
          rm -rf build
          mkdir -p build
          tar -xzf "build-artifacts/build-tree-${{ matrix.target }}.tar.gz" -C build

      - name: Run unit and integration tests
        run: bash .github/scripts/run-ctest.sh build

  system-tests-linux:
    name: system-linux-${{ matrix.target }}
    needs:
      - build-artifacts
      - unit-integration-tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-24.04
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends podman

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ matrix.target }}
          path: release-artifacts

      - name: Run Podman system tests
        run: |
          bash .github/scripts/run-system-tests-linux.sh \
            "release-artifacts/rqp-${{ env.RELEASE_ID }}-${{ matrix.target }}.tar.gz" \
            "${{ github.workspace }}" \
            "${{ matrix.target }}"

  system-tests-macos:
    name: system-macos-aarch64-darwin
    needs:
      - build-artifacts
      - unit-integration-tests
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-aarch64-darwin
          path: release-artifacts

      - name: Run native system tests
        run: |
          bash .github/scripts/run-system-tests-macos.sh \
            "release-artifacts/rqp-${{ env.RELEASE_ID }}-aarch64-darwin.tar.gz" \
            "${{ github.workspace }}"

  publish-container-arch:
    name: container-${{ matrix.arch }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    needs:
      - build-artifacts
      - unit-integration-tests
      - system-tests-linux
      - system-tests-macos
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-24.04
            arch: amd64
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ matrix.target }}
          path: release-artifacts

      - name: Resolve image metadata
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY##*/}"
          repo="${repo,,}"
          bundle_path="release-artifacts/rqp-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          [ -f "$bundle_path" ] || {
            printf 'Missing release bundle: %s\n' "$bundle_path" >&2
            exit 1
          }
          echo "bundle_path=$bundle_path" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "arch_tag=${GITHUB_REF_NAME}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Prepare Docker build context
        run: |
          rm -rf docker-release-context
          mkdir -p docker-release-context
          cp Dockerfile.release docker-release-context/Dockerfile
          cp "${{ steps.image.outputs.bundle_path }}" docker-release-context/rqp.tar.gz

      - name: Build container image
        run: |
          docker build \
            --build-arg REQPACK_VERSION="${GITHUB_REF_NAME}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg REPO_URL="https://github.com/${GITHUB_REPOSITORY}" \
            -t "${{ steps.image.outputs.image }}:${{ steps.image.outputs.arch_tag }}" \
            docker-release-context

      - name: Smoke test container image
        run: |
          docker run --rm "${{ steps.image.outputs.image }}:${{ steps.image.outputs.arch_tag }}" --help

      - name: Push container image
        run: |
          docker push "${{ steps.image.outputs.image }}:${{ steps.image.outputs.arch_tag }}"

  publish-container-manifest:
    name: publish-container-manifest
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: publish-container-arch
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: image
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY##*/}"
          repo="${repo,,}"
          echo "image=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Publish multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t "${{ steps.image.outputs.image }}:${GITHUB_REF_NAME}" \
            -t "${{ steps.image.outputs.image }}:latest" \
            "${{ steps.image.outputs.image }}:${GITHUB_REF_NAME}-amd64" \
            "${{ steps.image.outputs.image }}:${GITHUB_REF_NAME}-arm64"

  publish-release:
    name: publish-release
    if: |
      always() &&
      needs.build-artifacts.result == 'success' &&
      needs.unit-integration-tests.result == 'success' &&
      needs.system-tests-linux.result == 'success' &&
      needs.system-tests-macos.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.publish-container-manifest.result == 'success'
      )
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
      - unit-integration-tests
      - system-tests-linux
      - system-tests-macos
      - publish-container-manifest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-bundle-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum rqp-*.tar.gz > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" release-artifacts/rqp-*.tar.gz release-artifacts/SHA256SUMS \
            --title "$tag" \
            --notes "Portable binaries for $tag (Static linking where possible). Verified by CI."
